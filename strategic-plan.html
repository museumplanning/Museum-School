<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Museum Strategic Plan — Museum Planning LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
:root {
  --cream: #f5f0e8;
  --dark: #1a1612;
  --charcoal: #2d2825;
  --panel: #211d19;
  --gold: #b8963e;
  --gold-light: #d4af5a;
  --gold-dim: rgba(184,150,62,0.15);
  --muted: #8a8078;
  --border: rgba(184,150,62,0.2);
  --success: #4a8c5c;
  --sidebar: 280px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--dark);color:var(--cream);font-family:'Cormorant Garamond',Georgia,serif;}

/* ── P5 canvas ── */
#p5bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.4;}

/* ── LAYOUT ── */
#app{position:relative;z-index:1;display:grid;grid-template-rows:56px 1fr;grid-template-columns:var(--sidebar) 1fr;height:100vh;}

/* ── TOP BAR ── */
#topbar{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;
  border-bottom:1px solid var(--border);
  background:rgba(26,22,18,0.92);
  backdrop-filter:blur(10px);
}
.topbar-left{display:flex;align-items:center;gap:1rem;}
.logo-text{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;}
.topbar-divider{width:1px;height:18px;background:var(--border);}
#museum-name-display{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);}
.topbar-right{display:flex;align-items:center;gap:1rem;}
.progress-label{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;color:var(--muted);}
.progress-bar-wrap{width:120px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;}
.progress-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.5s ease;}
.btn-export{
  font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--dark);background:var(--gold);border:none;padding:0.4rem 1rem;cursor:pointer;
  transition:background 0.2s;
}
.btn-export:hover{background:var(--gold-light);}

/* ── SIDEBAR ── */
#sidebar{
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.sidebar-museum{padding:1.2rem 1.2rem 0.8rem;}
.sidebar-museum-label{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:0.5rem;}
.museum-badge{
  background:var(--gold-dim);border:1px solid var(--border);
  padding:0.7rem 0.8rem;
}
.museum-badge-name{font-family:'Playfair Display',serif;font-size:0.95rem;display:block;margin-bottom:0.2rem;}
.museum-badge-meta{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;color:var(--muted);}

.sidebar-phases{padding:1rem 0;}
.phase-nav-item{
  padding:0.8rem 1.2rem;
  cursor:pointer;
  border-left:2px solid transparent;
  transition:all 0.2s;
  display:flex;align-items:flex-start;gap:0.8rem;
}
.phase-nav-item:hover{background:rgba(184,150,62,0.05);}
.phase-nav-item.active{border-left-color:var(--gold);background:rgba(184,150,62,0.08);}
.phase-nav-item.completed{border-left-color:var(--success);}
.phase-num{
  font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.15em;color:var(--gold);
  margin-top:0.15rem;flex-shrink:0;
}
.phase-nav-item.completed .phase-num{color:var(--success);}
.phase-nav-title{font-size:0.95rem;font-weight:600;display:block;margin-bottom:0.1rem;}
.phase-nav-sub{font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--muted);letter-spacing:0.08em;}
.phase-check-row{
  display:flex;align-items:center;gap:0.4rem;
  padding:0.15rem 1.2rem 0.15rem 3.3rem;
}
.mini-check{
  width:10px;height:10px;border-radius:50%;
  border:1px solid var(--border);flex-shrink:0;
  transition:background 0.2s,border-color 0.2s;
}
.mini-check.done{background:var(--success);border-color:var(--success);}
.mini-check.active-step{background:var(--gold);border-color:var(--gold);}
.phase-check-label{font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.05em;color:var(--muted);}

.sidebar-footer{margin-top:auto;padding:1rem 1.2rem;border-top:1px solid var(--border);}
.sidebar-footer-text{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;color:var(--muted);line-height:1.6;}

/* ── MAIN AREA ── */
#main{overflow-y:auto;display:flex;flex-direction:column;}

/* ── SETUP SCREEN ── */
#setup-screen{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  min-height:100%;padding:3rem 2rem;
}
.setup-card{
  background:var(--panel);border:1px solid var(--border);
  padding:2.5rem;max-width:520px;width:100%;
}
.setup-title{font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:0.3rem;}
.setup-title em{font-style:italic;color:var(--gold);}
.setup-sub{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;color:var(--muted);margin-bottom:2rem;text-transform:uppercase;}
.form-row{margin-bottom:1.2rem;}
.form-row label{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:0.4rem;}
.form-row input,.form-row select,.form-row textarea{
  width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);
  color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:1rem;
  padding:0.7rem 0.9rem;outline:none;transition:border-color 0.2s;
  appearance:none;
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--gold);}
.form-row select option{background:var(--charcoal);}
.form-row textarea{resize:vertical;min-height:70px;font-size:0.9rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.btn-start{
  font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--dark);background:var(--gold);border:none;padding:0.9rem 2rem;
  cursor:pointer;width:100%;margin-top:0.5rem;transition:background 0.2s;
}
.btn-start:hover{background:var(--gold-light);}

/* ── PHASE CONTENT ── */
#phase-content{display:none;flex-direction:column;padding:1.5rem 2rem;}
.phase-header{margin-bottom:1.5rem;}
.phase-eyebrow{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem;}
.phase-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:400;}
.phase-title em{font-style:italic;color:var(--gold);}
.phase-desc{font-size:1rem;color:rgba(245,240,232,0.65);margin-top:0.4rem;line-height:1.6;}
.week-badge{
  display:inline-block;font-family:'DM Mono',monospace;font-size:0.55rem;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);
  border:1px solid var(--border);padding:0.25rem 0.7rem;margin-top:0.6rem;
}

/* ── CHECKLIST ITEMS ── */
.checklist-item{
  border:1px solid var(--border);margin-bottom:0.8rem;
  transition:border-color 0.2s;
  background:rgba(26,22,18,0.5);
}
.checklist-item.item-active{border-color:var(--gold);}
.checklist-item.item-done{border-color:var(--success);opacity:0.75;}
.item-header{
  display:grid;grid-template-columns:44px 1fr auto;
  align-items:center;gap:0.8rem;padding:0.9rem 1rem;
  cursor:pointer;
}
.item-number{
  font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;
  color:var(--gold);text-align:center;
}
.item-done .item-number{color:var(--success);}
.item-title-wrap{}
.item-title{font-size:1.05rem;font-weight:600;display:block;}
.item-subtitle{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.08em;color:var(--muted);}
.item-status{display:flex;align-items:center;gap:0.5rem;}
.status-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--border);}
.item-active .status-dot{background:var(--gold);border-color:var(--gold);}
.item-done .status-dot{background:var(--success);border-color:var(--success);}
.status-text{font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;}
.item-chevron{font-size:0.7rem;color:var(--muted);transition:transform 0.2s;}
.item-expanded .item-chevron{transform:rotate(180deg);}

.item-body{display:none;padding:0 1rem 1rem;border-top:1px solid var(--border);}
.item-expanded .item-body{display:block;}
.item-description{font-size:0.95rem;color:rgba(245,240,232,0.7);line-height:1.7;margin:0.8rem 0;}
.item-owner-row{
  display:flex;gap:1.5rem;margin-bottom:0.8rem;
  font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;
}
.item-owner span:first-child{color:var(--muted);}
.item-owner span:last-child{color:var(--cream);}

/* notes area */
.notes-label{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem;}
.notes-input{
  width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);
  color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:0.95rem;
  padding:0.7rem 0.9rem;outline:none;resize:vertical;min-height:65px;
  transition:border-color 0.2s;margin-bottom:0.8rem;
}
.notes-input:focus{border-color:var(--gold);}

/* ai section */
.ai-section{background:rgba(184,150,62,0.04);border:1px solid var(--border);padding:0.9rem;margin-bottom:0.8rem;}
.ai-section-label{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:0.6rem;display:flex;align-items:center;gap:0.5rem;}
.ai-section-label::before{content:'✦';font-size:0.6rem;}
.ai-output{
  font-size:0.95rem;line-height:1.75;color:rgba(245,240,232,0.85);
  white-space:pre-wrap;min-height:40px;
}
.ai-output.loading{color:var(--muted);font-style:italic;}
.ai-output.empty{color:var(--muted);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;}

.item-actions{display:flex;gap:0.7rem;flex-wrap:wrap;}
.btn-ai{
  font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--gold);background:transparent;border:1px solid var(--gold);
  padding:0.55rem 1.1rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem;
}
.btn-ai:hover{background:var(--gold-dim);}
.btn-ai:disabled{opacity:0.4;cursor:not-allowed;}
.btn-complete{
  font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--dark);background:var(--success);border:none;
  padding:0.55rem 1.1rem;cursor:pointer;transition:background 0.2s;
}
.btn-complete:hover{background:#5aa870;}
.btn-redo{
  font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--muted);background:transparent;border:1px solid var(--border);
  padding:0.55rem 0.8rem;cursor:pointer;transition:all 0.2s;margin-left:auto;
}
.btn-redo:hover{border-color:var(--muted);}

/* phase nav footer */
.phase-footer{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid var(--border);
}
.btn-phase-nav{
  font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
  padding:0.65rem 1.3rem;cursor:pointer;transition:all 0.2s;border:1px solid var(--border);
  color:var(--cream);background:transparent;
}
.btn-phase-nav:hover{border-color:var(--gold);color:var(--gold);}
.btn-phase-nav.primary{background:var(--gold);color:var(--dark);border-color:var(--gold);}
.btn-phase-nav.primary:hover{background:var(--gold-light);}
.btn-phase-nav:disabled{opacity:0.3;cursor:not-allowed;}
.phase-progress-text{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;color:var(--muted);}

/* spinner */
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{display:inline-block;width:10px;height:10px;border:1.5px solid var(--gold);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;}

/* fade in */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.fade-in{animation:fadeIn 0.4s ease forwards;}
</style>
</head>
<body>

<div id="p5bg"></div>

<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="topbar-left">
      <span class="logo-text">Museum Planning LLC</span>
      <div class="topbar-divider"></div>
      <span id="museum-name-display">Museum Strategic Plan</span>
    </div>
    <div class="topbar-right">
      <span class="progress-label">Overall Progress</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <button class="btn-export" onclick="exportSummary()">Export Summary</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-museum" id="sidebar-museum-block" style="display:none">
      <div class="sidebar-museum-label">Active Project</div>
      <div class="museum-badge">
        <span class="museum-badge-name" id="sb-museum-name">—</span>
        <span class="museum-badge-meta" id="sb-museum-meta">—</span>
      </div>
    </div>

    <div class="sidebar-phases" id="sidebar-phases"></div>

    <div class="sidebar-footer">
      <div class="sidebar-footer-text">
        Museum Planning LLC<br>
        Strategic Plan Workflow v1.0<br><br>
        AI assistance at every step.<br>
        Your judgment closes the plan.
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- SETUP SCREEN -->
    <div id="setup-screen">
      <div class="setup-card fade-in">
        <h1 class="setup-title">Museum <em>Strategic Plan</em></h1>
        <p class="setup-sub">Start a new engagement</p>

        <div class="form-row">
          <label>Museum Name</label>
          <input type="text" id="inp-name" placeholder="e.g. Riverside Children's Museum"/>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Museum Type</label>
            <select id="inp-type">
              <option value="">Select type...</option>
              <option>Children's Museum</option>
              <option>Art Museum</option>
              <option>History Museum</option>
              <option>Science Center</option>
              <option>Natural History Museum</option>
              <option>Aquarium</option>
              <option>Zoo</option>
              <option>Botanical Garden</option>
              <option>Community Museum</option>
              <option>Visitor Center</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-row">
            <label>Location</label>
            <input type="text" id="inp-location" placeholder="City, State"/>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Annual Budget</label>
            <select id="inp-budget">
              <option value="">Select range...</option>
              <option>Under $250K</option>
              <option>$250K – $1M</option>
              <option>$1M – $5M</option>
              <option>$5M – $20M</option>
              <option>Over $20M</option>
            </select>
          </div>
          <div class="form-row">
            <label>Staff Size</label>
            <select id="inp-staff">
              <option value="">Select size...</option>
              <option>1–5 staff</option>
              <option>6–15 staff</option>
              <option>16–50 staff</option>
              <option>51–150 staff</option>
              <option>150+ staff</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>Vitality / Key Context (optional)</label>
          <textarea id="inp-vitality" placeholder="Any known challenges, strengths, community context, or vitality index notes..."></textarea>
        </div>
        <div class="form-row">
          <label>Assigned To</label>
          <input type="text" id="inp-assignee" placeholder="Student or consultant name"/>
        </div>
        <button class="btn-start" onclick="startProject()">Begin Strategic Plan →</button>
      </div>
    </div>

    <!-- PHASE CONTENT -->
    <div id="phase-content"></div>

  </div><!-- /main -->
</div><!-- /app -->

<script>
// ── P5.JS BACKGROUND ──────────────────────────────────
new p5(function(p){
  let lines=[];
  p.setup=function(){
    let c=p.createCanvas(p.windowWidth,p.windowHeight);
    c.parent('p5bg');
    for(let i=0;i<14;i++) lines.push({
      x:p.random(p.width),y:p.random(p.height),
      len:p.random(50,180),angle:p.random(p.TWO_PI),
      speed:p.random(0.0002,0.0007),
      weight:p.random(0.3,1.0),alpha:p.random(15,45)
    });
  };
  p.draw=function(){
    p.clear();
    for(let l of lines){
      l.angle+=l.speed;
      let x2=l.x+Math.cos(l.angle)*l.len, y2=l.y+Math.sin(l.angle)*l.len;
      p.stroke(184,150,62,l.alpha); p.strokeWeight(l.weight);
      p.line(l.x,l.y,x2,y2);
      p.fill(184,150,62,l.alpha*0.5); p.noStroke();
      p.ellipse(l.x,l.y,2,2); p.noFill();
    }
  };
  p.windowResized=function(){p.resizeCanvas(p.windowWidth,p.windowHeight);};
});

// ── PROJECT DATA ──────────────────────────────────────
let museum = {};
let state  = { phase: 0, items: {} };

const PHASES = [
  {
    id: 'discovery',
    num: 'Phase 01',
    title: 'Discovery & Assessment',
    weeks: 'Weeks 1–5',
    desc: 'Understand the museum deeply before making any recommendations. Gather primary data, synthesize findings, and build consensus on where things stand.',
    items: [
      {
        id:'1.1', title:'Project Kickoff Meeting',
        sub:'Align on scope, timeline & expectations',
        owner:'Freelancer + Mark', timing:'Week 1',
        desc:'Schedule a 90-minute call with the Executive Director, board chair, and key staff. Confirm project scope, communication protocols, decision-making process, and timeline. Set expectations for stakeholder access.',
        aiTask:'kickoff',
        aiLabel:'Generate Kickoff Agenda'
      },
      {
        id:'1.2', title:'Document Collection & Review',
        sub:'Gather existing institutional materials',
        owner:'Freelancer', timing:'Week 1',
        desc:'Request and review: existing strategic plan (if any), bylaws, financials (3 years), annual reports, org chart, staff handbook, donor records, attendance data, and any recent evaluations or assessments.',
        aiTask:'doc-review',
        aiLabel:'Generate Document Request List'
      },
      {
        id:'1.3', title:'Stakeholder Interview Guide',
        sub:'Design the interview framework',
        owner:'Freelancer (AI-assisted)', timing:'Week 2',
        desc:'Work with the ED to identify 15–25 stakeholders including board members, staff, community leaders, funders, and frequent visitors. Create an interview guide with 8–10 open-ended questions covering mission alignment, community relevance, internal capacity, and future opportunities.',
        aiTask:'interview-guide',
        aiLabel:'Generate Interview Guide'
      },
      {
        id:'1.4', title:'Stakeholder Interviews',
        sub:'Conduct & document all interviews',
        owner:'Freelancer', timing:'Weeks 2–4',
        desc:'Complete all 15–25 interviews. Record with permission or take detailed notes. Aim for 45–60 minutes each. Focus on listening for themes, tensions, and unspoken priorities. Do not share individual responses with the institution.',
        aiTask:'interview-synthesis',
        aiLabel:'Synthesize Interview Notes'
      },
      {
        id:'1.5', title:'Community / Visitor Survey',
        sub:'Gather broad audience perspective',
        owner:'Freelancer', timing:'Weeks 2–4',
        desc:'Design a 10–15 question survey covering visitor satisfaction, community awareness, programming interest, and perceived value. Distribute via email and on-site. Target a minimum of 50 responses.',
        aiTask:'survey',
        aiLabel:'Generate Survey Questions'
      },
      {
        id:'1.6', title:'Environmental Scan (SWOT)',
        sub:'Synthesize all discovery findings',
        owner:'Freelancer (AI-assisted)', timing:'Weeks 4–5',
        desc:'Using interview notes, survey results, document review, and peer benchmarking, build a comprehensive SWOT analysis: internal Strengths and Weaknesses, external Opportunities and Threats. This is the analytical foundation of the entire strategic plan.',
        aiTask:'swot',
        aiLabel:'Generate SWOT Analysis'
      },
      {
        id:'1.7', title:'Phase 1 Summary Report',
        sub:'Document findings for client review',
        owner:'Freelancer (AI-assisted)', timing:'Week 5',
        desc:'Produce a 2–4 page summary of Phase 1 findings. Share with the client for review and approval before proceeding to Phase 2. This creates alignment on the current state before moving into strategy.',
        aiTask:'phase1-report',
        aiLabel:'Draft Phase 1 Summary'
      },
    ]
  },
  {
    id: 'priorities',
    num: 'Phase 02',
    title: 'Strategic Priorities',
    weeks: 'Weeks 6–10',
    desc: 'Facilitate the hard conversations and translate findings into a shared direction. The workshops in this phase are the heart of the strategic planning process.',
    items: [
      {
        id:'2.1', title:'Mission / Vision Review Workshop',
        sub:'Affirm or update the institutional foundation',
        owner:'Freelancer + Mark (optional)', timing:'Week 6',
        desc:'Facilitate a 2-hour session with board and staff leadership to review the current mission and vision statements. Are they still accurate? Do they reflect where the museum is heading? Affirm or revise as needed.',
        aiTask:'mission-vision',
        aiLabel:'Generate Workshop Facilitation Guide'
      },
      {
        id:'2.2', title:'Strategic Priorities Workshop',
        sub:'Board retreat — identify the pillars',

// ── STATE HELPERS ──────────────────────────────────────
function totalItems(){return PHASES.reduce((s,p)=>s+p.items.length,0);}
function completedItems(){return Object.values(state.items).filter(v=>v.done).length;}
function getItemState(id){return state.items[id]||(state.items[id]={done:false,notes:'',aiOutput:''});}
function saveState(){try{localStorage.setItem('mpl_sp_state',JSON.stringify({museum,state}));}catch(e){}}
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem('mpl_sp_state')||'null');
    if(d&&d.museum&&d.museum.name){museum=d.museum;state=d.state;return true;}
  }catch(e){}
  return false;
}

// ── SETUP ─────────────────────────────────────────────
function startProject(){
  const name=document.getElementById('inp-name').value.trim();
  if(!name){alert('Please enter a museum name.');return;}
  museum={
    name,
    type:document.getElementById('inp-type').value||'Museum',
    location:document.getElementById('inp-location').value||'',
    budget:document.getElementById('inp-budget').value||'',
    staff:document.getElementById('inp-staff').value||'',
    vitality:document.getElementById('inp-vitality').value||'',
    assignee:document.getElementById('inp-assignee').value||'Unassigned',
  };
  state={phase:0,items:{}};
  saveState();
  initApp();
}

// ── INIT APP ──────────────────────────────────────────
function initApp(){
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('museum-name-display').textContent=museum.name;
  document.getElementById('sidebar-museum-block').style.display='block';
  document.getElementById('sb-museum-name').textContent=museum.name;
  document.getElementById('sb-museum-meta').textContent=`${museum.type} · ${museum.location}`;
  buildSidebar();
  renderPhase(state.phase);
  updateProgress();
}

// ── SIDEBAR ───────────────────────────────────────────
function buildSidebar(){
  const el=document.getElementById('sidebar-phases');
  el.innerHTML='';
  PHASES.forEach((ph,pi)=>{
    const allDone=ph.items.every(it=>getItemState(it.id).done);
    const isActive=pi===state.phase;
    const div=document.createElement('div');
    div.className=`phase-nav-item${isActive?' active':''}${allDone?' completed':''}`;
    div.setAttribute('data-phase',pi);
    div.innerHTML=`<span class="phase-num">${ph.num}</span><div>
      <span class="phase-nav-title">${ph.title}</span>
      <span class="phase-nav-sub">${ph.weeks}</span>
    </div>`;
    div.onclick=()=>renderPhase(pi);
    el.appendChild(div);
    // mini checks
    ph.items.forEach(it=>{
      const ist=getItemState(it.id);
      const row=document.createElement('div');
      row.className='phase-check-row';
      row.innerHTML=`<div class="mini-check${ist.done?' done':''}"></div><span class="phase-check-label">${it.id} ${it.title}</span>`;
      el.appendChild(row);
    });
  });
}

// ── RENDER PHASE ──────────────────────────────────────
function renderPhase(pi){
  state.phase=pi;
  saveState();
  // update sidebar
  document.querySelectorAll('.phase-nav-item').forEach((el,i)=>{
    el.classList.toggle('active',i===pi);
  });
  const ph=PHASES[pi];
  const pc=document.getElementById('phase-content');
  pc.style.display='flex';
  const doneCount=ph.items.filter(it=>getItemState(it.id).done).length;
  pc.innerHTML=`
    <div class="phase-header fade-in">
      <div class="phase-eyebrow">${ph.num} of ${PHASES.length}</div>
      <h2 class="phase-title">${ph.title.replace(' & ',' <em>&</em> ')}</h2>
      <p class="phase-desc">${ph.desc}</p>
      <span class="week-badge">${ph.weeks} &nbsp;·&nbsp; ${doneCount}/${ph.items.length} complete</span>
    </div>
    <div id="items-container">
      ${ph.items.map((it,ii)=>renderItem(it,ii===0&&!getItemState(it.id).done)).join('')}
    </div>
    <div class="phase-footer">
      <button class="btn-phase-nav" onclick="renderPhase(${pi-1})" ${pi===0?'disabled':''}>← Previous Phase</button>
      <span class="phase-progress-text">${doneCount} of ${ph.items.length} steps complete</span>
      <button class="btn-phase-nav primary" onclick="renderPhase(${pi+1})" ${pi===PHASES.length-1?'disabled':''}>Next Phase →</button>
    </div>
  `;
}

function renderItem(it, expanded){
  const ist=getItemState(it.id);
  const cls=ist.done?'item-done':(expanded?'item-active':'');
  const expCls=expanded&&!ist.done?' item-expanded':'';
  return `<div class="checklist-item ${cls}${expCls} fade-in" id="item-${it.id.replace('.','_')}">
    <div class="item-header" onclick="toggleItem('${it.id}')">
      <span class="item-number">${it.id}</span>
      <div class="item-title-wrap">
        <span class="item-title">${it.title}</span>
        <span class="item-subtitle">${it.sub}</span>
      </div>
      <div class="item-status">
        <div class="status-dot"></div>
        <span class="status-text">${ist.done?'Complete':expanded?'In Progress':'Pending'}</span>
        <span class="item-chevron">▼</span>
      </div>
    </div>
    <div class="item-body">
      <p class="item-description">${it.desc}</p>
      <div class="item-owner-row">
        <div class="item-owner"><span>Owner: </span><span>${it.owner}</span></div>
        <div class="item-owner"><span>Timing: </span><span>${it.timing}</span></div>
      </div>
      <div class="notes-label">Your Notes</div>
      <textarea class="notes-input" id="notes-${it.id.replace('.','_')}" 
        placeholder="Add context, data, or observations for this step..."
        onchange="saveNotes('${it.id}',this.value)">${ist.notes||''}</textarea>
      <div class="ai-section">
        <div class="ai-section-label">AI Assistant — ${it.aiLabel}</div>
        <div class="ai-output ${ist.aiOutput?'':'empty'}" id="ai-out-${it.id.replace('.','_')}">
          ${ist.aiOutput||'Click the button below to generate AI assistance for this step.'}
        </div>
      </div>
      <div class="item-actions">
        <button class="btn-ai" id="btn-ai-${it.id.replace('.','_')}" onclick="runAI('${it.id}')">
          <span class="btn-ai-inner">✦ ${it.aiLabel}</span>
        </button>
        ${ist.done
          ? `<button class="btn-redo" onclick="undoItem('${it.id}')">↩ Mark Incomplete</button>`
          : `<button class="btn-complete" onclick="completeItem('${it.id}')">✓ Mark Complete</button>`
        }
      </div>
    </div>
  </div>`;
}

function toggleItem(id){
  const el=document.getElementById(`item-${id.replace('.','_')}`);
  if(!el) return;
  el.classList.toggle('item-expanded');
  if(el.classList.contains('item-expanded')) el.classList.add('item-active');
}

function saveNotes(id,val){
  getItemState(id).notes=val;
  saveState();
}

function completeItem(id){
  getItemState(id).done=true;
  saveState();
  updateProgress();
  buildSidebar();
  renderPhase(state.phase);
}

function undoItem(id){
  getItemState(id).done=false;
  saveState();
  updateProgress();
  buildSidebar();
  renderPhase(state.phase);
}

function updateProgress(){
  const pct=totalItems()>0?(completedItems()/totalItems()*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
}

// ── AI CALLS ──────────────────────────────────────────
function buildPrompt(task, itemId){
  const ph=PHASES.find(p=>p.items.find(i=>i.id===itemId));
  const it=ph?ph.items.find(i=>i.id===itemId):null;
  const notes=getItemState(itemId).notes||'';
  const ctx=`Museum: ${museum.name}
Type: ${museum.type}
Location: ${museum.location}
Budget: ${museum.budget}
Staff: ${museum.staff}
Vitality/Context: ${museum.vitality||'Not provided'}
Additional Notes from Consultant: ${notes||'None'}`;

  const prompts={
    'kickoff':`You are a museum planning consultant. Create a detailed agenda for a 90-minute strategic planning kickoff meeting for the following museum.\n\n${ctx}\n\nInclude: welcome & introductions, project overview, scope confirmation, timeline walkthrough, stakeholder interview scheduling, document collection process, Q&A. Use a professional but warm tone appropriate for a nonprofit board and staff.`,
    'doc-review':`You are a museum planning consultant. Create a comprehensive document request list for a strategic planning engagement for the following museum.\n\n${ctx}\n\nOrganize by category: governance documents, financial documents, programmatic documents, audience/attendance data, marketing materials, previous plans. Be specific about what to request and why each document matters for strategic planning.`,
    'interview-guide':`You are a museum planning consultant. Create a stakeholder interview guide for a strategic planning engagement.\n\n${ctx}\n\nWrite 10 open-ended questions covering: mission alignment and relevance, community perception and reach, internal organizational health, programmatic strengths and gaps, financial sustainability, and aspirations for the future. Include a brief facilitator note before each question with what to listen for.`,
    'interview-synthesis':`You are a museum planning consultant. Based on the consultant's notes below, synthesize stakeholder interview findings into key themes.\n\n${ctx}\n\nOrganize themes under: What people value most, Key tensions or concerns, Opportunities identified, Organizational challenges, and Aspirations. Present as a synthesis narrative, not individual quotes. Keep individual responses fully anonymous.`,
    'survey':`You are a museum planning consultant. Design a community/visitor survey for the following museum's strategic planning process.\n\n${ctx}\n\nWrite 12 survey questions covering: awareness and visitation patterns, satisfaction with current offerings, unmet community needs, programming interests, perception of the museum's role in the community, and willingness to support. Mix multiple choice, rating scale, and 1-2 open-ended questions.`,
    'swot':`You are a museum planning consultant. Based on the context provided, draft a preliminary SWOT analysis framework for this museum's strategic plan.\n\n${ctx}\n\nWrite 4-6 points per quadrant (Strengths, Weaknesses, Opportunities, Threats). Base strengths and weaknesses on internal factors; opportunities and threats on external factors. Include a brief one-sentence explanation for each point. Note clearly which points are preliminary and should be validated through stakeholder interviews.`,
    'phase1-report':`You are a museum planning consultant. Draft a Phase 1 Discovery Summary Report for the following museum.\n\n${ctx}\n\nStructure: Executive Summary (2-3 sentences), Process Overview, Key Findings from Interviews, Key Findings from Survey, SWOT Summary, Peer Context, and Recommended Focus Areas for Phase 2. Keep the tone factual and constructive. Length: 2-4 pages equivalent.`,
    'mission-vision':`You are a museum planning consultant. Create a facilitation guide for a 2-hour mission and vision review workshop.\n\n${ctx}\n\nInclude: warm-up exercise (15 min), current statement review exercise (20 min), small group discussion prompts, full group synthesis activity, and decision-making framework for affirming vs. revising statements. Include 3-5 discussion prompts for each section.`,
    'priorities-workshop':`You are a museum planning consultant. Create a detailed facilitation plan for a half-day strategic priorities board retreat.\n\n${ctx}\n\nStructure the retreat: welcome and grounding (15 min), Phase 1 findings presentation (30 min), small group priority identification exercises (45 min), reporting out and theme clustering (30 min), full group prioritization (30 min), next steps and close (15 min). Include specific facilitation prompts, materials needed, and contingency notes for common workshop challenges.`,
    'pillars':`You are a museum planning consultant. Based on the strategic planning context provided, draft 4 strategic priority pillars for this museum's 3-year strategic plan.\n\n${ctx}\n\nFor each pillar: provide a short memorable name (2-5 words), a 2-3 sentence rationale explaining why it is a priority, and a connection to the environmental scan findings. The pillars should be distinct, collectively comprehensive, and achievable within a 3-year horizon.`,
    'goals':`You are a museum planning consultant. Based on the strategic pillars provided in the consultant notes, draft goals and SMART objectives.\n\n${ctx}\n\nFor each strategic pillar: write 3 goals. For each goal: write 2-3 SMART objectives (Specific, Measurable, Achievable, Relevant, Time-bound). All objectives must start with an action verb and include a measurable outcome. Format clearly with pillar → goal → objectives hierarchy.`,
    'validation':`You are a museum planning consultant. Create an agenda and facilitation guide for a staff validation session on the draft strategic priorities.\n\n${ctx}\n\nThis 90-minute session is NOT a re-voting session. It is a check for blind spots. Include: framing the purpose clearly (10 min), small group reactions by pillar (40 min), full group synthesis (25 min), closing and next steps (15 min). Include specific language for managing concerns without reopening settled decisions.`,
    'signoff':`You are a museum planning consultant. Draft a Phase 2 sign-off memo for client approval.\n\n${ctx}\n\nThe memo should: confirm the approved strategic priorities and goals, outline what will be drafted in Phase 3, confirm the review timeline, and request formal written approval to proceed. Professional, clear, concise.`,
    'full-draft':`You are a museum planning consultant. Draft an outline and introduction sections for a full museum strategic plan.\n\n${ctx}\n\nWrite: 1) A complete table of contents, 2) An Executive Summary (300-400 words), 3) An Organizational Overview section (200-300 words), 4) A Planning Process description (150-200 words). Use professional nonprofit language. The tone should be aspirational but grounded.`,
    'matrix':`You are a museum planning consultant. Create an implementation matrix framework for this museum's strategic plan.\n\n${ctx}\n\nBased on the consultant notes, build a sample implementation matrix with the following columns: Strategic Priority, Goal, Objective, Responsible Party (role), Timeline (Year 1/2/3), Success Metric, Resource Level (Low/Medium/High). Include at least 2 sample objectives per pillar mentioned in the notes. Format as a clear table.`,
    'review-prep':`You are a museum planning consultant. Draft a transmittal email to send the draft strategic plan to the client for review.\n\n${ctx}\n\nInclude: a brief overview of what is included, specific guidance on what type of feedback is most helpful (content vs. edits vs. additions), the review timeline (10 business days), instructions for compiling and returning feedback, and a note about the next step after review. Professional, warm, clear.`,
    'revision-notes':`You are a museum planning consultant. Draft a revision summary document template.\n\n${ctx}\n\nCreate a structured template for documenting: changes made from Version 1 to Version 2, rationale for each significant change, any client feedback that was not incorporated and why, and questions for the lead consultant. This ensures a clean audit trail of the revision process.`,
    'proofread-checklist':`You are a museum planning consultant. Create a detailed proofreading and quality review checklist for a museum strategic plan document.\n\n${ctx}\n\nOrganize by: Content accuracy (mission statement, data, names), Strategic coherence (do pillars connect to SWOT? do objectives connect to goals?), Implementation matrix completeness (every objective has owner, timeline, metric), Formatting consistency, Grammar and style, and Museum Planning LLC template requirements.`,
    'board-presentation':`You are a museum planning consultant. Create an outline for a board presentation to approve the final strategic plan.\n\n${ctx}\n\nStructure: Opening context (why we did this process), Process overview (how we got here), Key findings summary, Strategic priorities overview with highlights, Implementation highlights, Request for formal approval, and Q&A preparation notes. Include suggested slides and talking points.`,
    'exec-summary':`You are a museum planning consultant. Draft a one-page executive summary of the strategic plan for public release.\n\n${ctx}\n\nInclude: a compelling opening statement about the museum's role in the community, the planning process overview (1-2 sentences), the strategic priorities with a one-sentence summary of each, a closing statement about the path forward. Language should be accessible to a general audience, not just museum professionals.`,
    'comms':`You are a museum planning consultant. Draft two communication pieces for the strategic plan launch.\n\n${ctx}\n\n1) An internal staff memo from the Executive Director announcing board approval of the strategic plan. Should be warm, celebratory, and connect the plan to day-to-day work.\n\n2) A brief external announcement (suitable for website or press release) announcing the new strategic plan. Should highlight community impact and forward momentum.`,
    'delivery-checklist':`You are a museum planning consultant. Create a final deliverables checklist for closing a strategic planning engagement.\n\n${ctx}\n\nList every file to be delivered with: file name convention, format (Word, PDF, Excel), version notes, and any special instructions. Include the complete engagement package: plan document, executive summary, implementation matrix, supporting research files, and project archive.`,
    'closeout':`You are a museum planning consultant. Draft a project closeout email to the client.\n\n${ctx}\n\nInclude: congratulations on completing the process, summary of what was delivered, a brief note on Year 1 implementation priorities, an invitation to discuss ongoing support, and a gracious close. Also draft a brief internal lessons-learned memo for the Museum Planning LLC project file.`,
  };

  return prompts[task]||`You are a museum planning consultant working on a strategic plan for ${museum.name}, a ${museum.type} in ${museum.location}. ${notes?'The consultant has provided these notes: '+notes+' ':''} Please provide professional guidance for this step of the strategic planning process.`;
}

async function runAI(id){
  const el=PHASES.flatMap(p=>p.items).find(i=>i.id===id);
  if(!el) return;
  const btnId=`btn-ai-${id.replace('.','_')}`;
  const outId=`ai-out-${id.replace('.','_')}`;
  const btn=document.getElementById(btnId);
  const out=document.getElementById(outId);
  if(!btn||!out) return;

  btn.disabled=true;
  btn.innerHTML=`<span class="spinner"></span> Generating...`;
  out.className='ai-output loading';
  out.textContent='Generating AI assistance — this takes 10–20 seconds...';

  try{
    const prompt=buildPrompt(el.aiTask, id);
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'You are an expert museum planning consultant with 20+ years of experience. You follow the Museum Planning LLC methodology developed by Mark Walhimer, author of Museums 101 and Designing Museum Experiences. You produce professional, actionable, and specific outputs tailored to each museum\'s context. Be direct and practical.',
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await resp.json();
    const text=data.content?.map(c=>c.text||'').join('')||'No response generated.';
    getItemState(id).aiOutput=text;
    saveState();
    out.className='ai-output fade-in';
    out.textContent=text;
  }catch(err){
    out.className='ai-output';
    out.textContent='Error connecting to AI. Check your connection and try again.';
  }
  btn.disabled=false;
  btn.innerHTML=`✦ Regenerate`;
}

// ── EXPORT ────────────────────────────────────────────
function exportSummary(){
  const done=completedItems();
  const total=totalItems();
  let txt=`MUSEUM STRATEGIC PLAN — PROJECT SUMMARY\n`;
  txt+=`Museum Planning LLC\n`;
  txt+=`${'='.repeat(50)}\n\n`;
  txt+=`Museum: ${museum.name}\n`;
  txt+=`Type: ${museum.type}\n`;
  txt+=`Location: ${museum.location}\n`;
  txt+=`Budget: ${museum.budget}\n`;
  txt+=`Staff: ${museum.staff}\n`;
  txt+=`Assigned To: ${museum.assignee}\n`;
  txt+=`Progress: ${done}/${total} steps complete (${Math.round(done/total*100)}%)\n\n`;

  PHASES.forEach(ph=>{
    txt+=`\n${'─'.repeat(50)}\n${ph.num}: ${ph.title.toUpperCase()}\n${'─'.repeat(50)}\n`;
    ph.items.forEach(it=>{
      const ist=getItemState(it.id);
      txt+=`\n[${ist.done?'✓':' '}] ${it.id} — ${it.title}\n`;
      if(ist.notes) txt+=`  Notes: ${ist.notes}\n`;
      if(ist.aiOutput) txt+=`\n  AI Output:\n  ${ist.aiOutput.replace(/\n/g,'\n  ')}\n`;
    });
  });

  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${museum.name.replace(/\s+/g,'-')}-Strategic-Plan-Summary.txt`;
  a.click();
}

// ── INIT ──────────────────────────────────────────────
if(loadState()&&museum.name){
  initApp();
}
